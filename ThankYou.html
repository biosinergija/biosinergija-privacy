<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hvala na porudžbini — luxury thank you</title>
  <style>
    /* Minimal luxury reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #faf9f7;  /* soft warm white */
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
      line-height: 1.5;
      color: #2e2e2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* main card – clean, airy, subtle */
    .thankyou-container {
      max-width: 720px;
      width: 100%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(224, 215, 202, 0.5);  /* soft greige border */
      border-radius: 32px;
      padding: 4rem 3rem;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05),
                  0 8px 20px -8px rgba(0, 0, 0, 0.03);
      text-align: center;
      transition: all 0.3s ease;
    }

    /* small luxury emblem – abstract / minimalist */
    .emblem {
      margin-bottom: 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle-check {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: transparent;
      border: 1.5px solid #c9b696;  /* muted gold */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .circle-check::after {
      content: "";
      width: 28px;
      height: 14px;
      border-left: 2px solid #c9b696;
      border-bottom: 2px solid #c9b696;
      transform: rotate(-45deg) translate(2px, -1px);
      margin-top: -4px; /* fine adjustment */
    }

    /* main message – elegant serif, generous spacing */
    .main-message {
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.2;
      color: #1f1f1f;
      margin-bottom: 1rem;
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
      text-transform: none;
    }

    /* supporting text – refined, lighter */
    .support-text {
      font-size: 1.4rem;
      font-weight: 300;
      color: #4a4a4a;
      max-width: 500px;
      margin: 0 auto 2rem auto;
      font-family: 'Cormorant Garamond', 'Times New Roman', serif;
      line-height: 1.6;
      letter-spacing: 0.01em;
    }

    .support-text p {
      margin-bottom: 0.75rem;
    }

    .support-text p:last-of-type {
      margin-bottom: 0;
    }

    /* subtle divider – whisper thin */
    .divider {
      width: 80px;
      height: 1px;
      background: #dcd5cc;
      margin: 2.5rem auto 0 auto;
      opacity: 0.5;
    }

    /* optional micro note – almost invisible, just for balance */
    .micro {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
      color: #b2a99f;
      text-transform: uppercase;
      font-weight: 300;
      font-family: 'Inter', 'Helvetica Neue', sans-serif;
    }

    /* responsive elegance */
    @media (max-width: 550px) {
      .thankyou-container {
        padding: 3rem 1.8rem;
        border-radius: 28px;
      }
      .main-message {
        font-size: 2.2rem;
      }
      .support-text {
        font-size: 1.2rem;
      }
      .circle-check {
        width: 64px;
        height: 64px;
      }
    }

    @media (max-width: 380px) {
      .main-message {
        font-size: 1.9rem;
      }
      .support-text {
        font-size: 1.1rem;
      }
    }

    /* load elegant fonts */
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300&display=swap');
  </style>
</head>
<body>
  <div class="thankyou-container">
    <!-- minimal golden emblem (checkmark) -->
    <div class="emblem">
      <div class="circle-check" aria-hidden="true"></div>
    </div>

    <!-- main thank you text exactly as requested (Serbian, without diacritics) -->
    <div class="main-message">
      Hvala Vam na porudzbini!
    </div>

    <div class="support-text">
      <p>Naši zaposljeni će uskoro videti vaše podatke.</p>
      <p>Vaša porudzbina će uskoro biti spremna.</p>
    </div>

    <!-- whisper divider for structure -->
    <div class="divider"></div>

    <!-- barely visible micro line – pure atmosphere -->
    <div class="micro">•  Srbija  •</div>
  </div>

</body>
</html>
